name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # यह नया जादुई स्टेप है जो आपके लिए बैकग्राउंड में Android की 100+ फाइलें बना देगा
      - name: Create Flutter Project Files
        run: flutter create . --platforms android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-PDF-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
