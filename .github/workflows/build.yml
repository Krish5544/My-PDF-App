name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get
        working-directory: ./pdf_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./pdf_app

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Mera-PDF-App-APK
          path: pdf_app/build/app/outputs/flutter-apk/app-release.apk
