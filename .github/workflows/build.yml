name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # यहाँ हमने --project-name pdf_app जोड़ दिया है ताकि नाम का एरर न आए
      - name: Create Flutter Project Files
        run: flutter create --project-name pdf_app . --platforms android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mera-PDF-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
